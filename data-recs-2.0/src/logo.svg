<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1628"/>
      <stop offset="100%" stop-color="#13192e"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7b5ea7"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="strike-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffa3"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg-grad)"/>
  <rect width="100" height="100" rx="22" fill="none" stroke="rgba(0,229,255,0.18)" stroke-width="1.5"/>

  <!-- 4 vertical tally bars -->
  <rect x="14" y="24" width="10" height="52" rx="5" fill="url(#bar-grad)"/>
  <rect x="30" y="24" width="10" height="52" rx="5" fill="url(#bar-grad)"/>
  <rect x="46" y="24" width="10" height="52" rx="5" fill="url(#bar-grad)"/>
  <rect x="62" y="24" width="10" height="52" rx="5" fill="url(#bar-grad)"/>

  <!-- Diagonal strike-through (the 5th tally mark) -->
  <line x1="10" y1="82" x2="86" y2="18" stroke="url(#strike-grad)" stroke-width="7.5" stroke-linecap="round"/>
</svg>
