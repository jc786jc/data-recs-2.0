<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tally — Run History</title>
  <link rel="stylesheet" href="src/styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    .hist-wrap   { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; position: relative; z-index: 5; }
    .hist-header { margin-bottom: 32px; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .hist-header h1 { font-size: 26px; font-weight: 800; }
    .hist-header p  { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* Run card */
    .run-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
      transition: border-color .2s;
    }
    .run-card:hover { border-color: rgba(0,229,255,.25); }

    .run-header {
      display: flex; align-items: center; gap: 16px;
      padding: 18px 22px;
      cursor: pointer;
      user-select: none;
    }
    .run-date {
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      color: var(--accent); white-space: nowrap;
    }
    .run-label { flex: 1; font-size: 13px; color: var(--text); font-weight: 600; }
    .run-label span { color: var(--text-muted); font-weight: 400; }

    .run-stats { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .run-stat  {
      font-family: var(--mono); font-size: 11px;
      padding: 3px 9px; border-radius: 20px;
      border: 1px solid var(--border);
    }
    .stat-green  { border-color: rgba(0,255,163,.3); color: var(--green); }
    .stat-red    { border-color: rgba(255,107,107,.3); color: var(--accent3); }
    .stat-blue   { border-color: rgba(0,229,255,.2);  color: var(--accent); }
    .stat-purple { border-color: rgba(179,136,255,.3); color: var(--accent2); }

    .run-chevron { color: var(--text-muted); font-size: 14px; transition: transform .2s; }
    .run-card.open .run-chevron { transform: rotate(90deg); }

    /* Run detail */
    .run-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 20px 22px;
    }
    .run-card.open .run-detail { display: block; }

    .detail-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 18px; }
    .detail-stat {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px; text-align: center;
    }
    .detail-stat .ds-val  { font-size: 22px; font-weight: 800; margin-bottom: 3px; }
    .detail-stat .ds-lbl  { font-size: 11px; color: var(--text-muted); }

    .detail-row  { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
    .detail-item { font-size: 12px; color: var(--text-muted); }
    .detail-item strong { color: var(--text); font-weight: 600; }

    .jira-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      background: rgba(0,229,255,.06); border: 1px solid rgba(0,229,255,.2);
      border-radius: 6px; color: var(--accent); font-size: 12px; font-weight: 700;
      text-decoration: none;
    }
    .jira-link:hover { background: rgba(0,229,255,.12); }

    /* Agent modal */
    #agent-modal {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
      align-items: flex-end; justify-content: center; padding: 20px;
    }
    #agent-modal-inner {
      background: var(--surface); border: 1px solid var(--border);
      border-top: 2px solid var(--accent2);
      border-radius: 16px; width: 100%; max-width: 620px;
      padding: 28px; max-height: 80vh; overflow-y: auto;
      animation: fadeIn .25s ease;
    }

    .empty-hist {
      text-align: center; padding: 80px 20px;
      color: var(--text-muted); font-size: 14px; line-height: 1.8;
    }
    .empty-hist .icon { font-size: 48px; margin-bottom: 16px; }

    @media (max-width: 700px) {
      .detail-grid { grid-template-columns: repeat(2,1fr); }
      .run-stats   { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <img src="src/logo.svg" alt="Tally" style="width:36px;height:36px;border-radius:8px;display:block;flex-shrink:0;">
        <div class="logo-text">Tally</div>
      </a>
      <div style="margin-left:16px;font-size:12px;color:var(--text-muted);border-left:1px solid var(--border);padding-left:16px;">Run History</div>
    </div>
    <div class="header-right">
      <a href="data-recs.html" class="btn btn-primary btn-sm">+ New Run</a>
      <a href="index.html" class="btn btn-secondary btn-sm">Home</a>
    </div>
  </header>

  <!-- AGENT MODAL -->
  <div id="agent-modal">
    <div id="agent-modal-inner">
      <div id="agent-modal-content"></div>
    </div>
  </div>

  <div class="hist-wrap">

    <div class="hist-header">
      <div>
        <h1>Run History</h1>
        <p>All past reconciliation runs — click a row to expand, use Ask Agent to query Jira comments via Claude.</p>
      </div>
      <button onclick="clearHistory()" class="btn btn-secondary btn-sm"
        style="color:var(--accent3);border-color:rgba(255,107,107,.3);">Clear History</button>
    </div>

    <div id="history-list"></div>

  </div>

  <script src="src/styles.css" type="text/css"></script>
  <script>

    /* ── LOAD & RENDER ────────────────────────────────────────── */

    function getHistory() {
      try { return JSON.parse(localStorage.getItem('tally_run_history') || '[]'); }
      catch (_) { return []; }
    }

    function render() {
      const list    = document.getElementById('history-list');
      const history = getHistory();

      if (!history.length) {
        list.innerHTML = `
          <div class="empty-hist">
            <div class="icon">📋</div>
            No reconciliation runs yet.<br/>
            <a href="data-recs.html" style="color:var(--accent);">Run your first reconciliation →</a>
          </div>`;
        return;
      }

      list.innerHTML = history.map(run => {
        const matchClass  = parseFloat(run.matchRate) >= 95 ? 'stat-green' : parseFloat(run.matchRate) >= 80 ? 'stat-blue' : 'stat-red';
        const srcLabel    = run.srcDesc || `${run.srcProject}.${run.srcDataset}.${run.srcTable}`;
        const tgtLabel    = run.tgtDesc || `${run.tgtProject}.${run.tgtDataset}.${run.tgtTable}`;
        const ticketHtml  = run.jiraTicket
          ? `<a href="${esc(run.jiraTicket.url)}" target="_blank" class="jira-link">🎫 ${esc(run.jiraTicket.key)} ↗</a>`
          : `<span style="font-size:12px;color:var(--text-muted);">No ticket raised</span>`;
        const agentBtnHtml = run.jiraTicket
          ? `<button class="btn btn-sm" onclick="askAgent(${run.id})"
               style="background:linear-gradient(135deg,rgba(179,136,255,.15),rgba(0,229,255,.1));border:1px solid rgba(179,136,255,.4);color:var(--text);font-weight:700;cursor:pointer;">
               🤖 Ask Agent
             </button>`
          : '';

        return `
          <div class="run-card" id="run-${run.id}">
            <div class="run-header" onclick="toggleRun(${run.id})">
              <div class="run-date">${esc(run.date)}</div>
              <div class="run-label">${esc(srcLabel)} <span>→ ${esc(tgtLabel)}</span></div>
              <div class="run-stats">
                <span class="run-stat stat-blue">${Number(run.srcCount).toLocaleString()} src</span>
                <span class="run-stat stat-green">${Number(run.matchedCount).toLocaleString()} matched</span>
                <span class="run-stat stat-red">${Number(run.unmatchedCount).toLocaleString()} exceptions</span>
                <span class="run-stat ${matchClass}">${run.matchRate}%</span>
                ${run.jiraTicket ? `<span class="run-stat stat-purple">🎫 ${esc(run.jiraTicket.key)}</span>` : ''}
              </div>
              <span class="run-chevron">›</span>
            </div>
            <div class="run-detail">
              <div class="detail-grid">
                <div class="detail-stat">
                  <div class="ds-val" style="color:var(--accent);">${Number(run.srcCount).toLocaleString()}</div>
                  <div class="ds-lbl">Source Records</div>
                </div>
                <div class="detail-stat">
                  <div class="ds-val" style="color:var(--green);">${Number(run.matchedCount).toLocaleString()}</div>
                  <div class="ds-lbl">Matched</div>
                </div>
                <div class="detail-stat">
                  <div class="ds-val" style="color:var(--accent3);">${Number(run.unmatchedCount).toLocaleString()}</div>
                  <div class="ds-lbl">Exceptions</div>
                </div>
                <div class="detail-stat">
                  <div class="ds-val" style="color:${parseFloat(run.matchRate)>=95?'var(--green)':parseFloat(run.matchRate)>=80?'var(--accent)':'var(--accent3)'};">${run.matchRate}%</div>
                  <div class="ds-lbl">Match Rate</div>
                </div>
              </div>

              <div class="detail-row">
                <div class="detail-item"><strong>Source:</strong> ${esc(run.srcProject)}.${esc(run.srcDataset)}.${esc(run.srcTable)}</div>
                <div class="detail-item"><strong>Target:</strong> ${esc(run.tgtProject)}.${esc(run.tgtDataset)}.${esc(run.tgtTable)}</div>
              </div>
              ${run.exceptionsTable ? `
              <div class="detail-row">
                <div class="detail-item"><strong>Exceptions table:</strong> ${esc(run.exceptionsTable)}</div>
              </div>` : ''}

              <div style="display:flex;align-items:center;gap:12px;margin-top:8px;flex-wrap:wrap;">
                ${ticketHtml}
                ${agentBtnHtml}
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function toggleRun(id) {
      document.getElementById('run-' + id)?.classList.toggle('open');
    }

    function clearHistory() {
      if (!confirm('Clear all run history? This cannot be undone.')) return;
      localStorage.removeItem('tally_run_history');
      render();
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── ASK AGENT ────────────────────────────────────────────── */

    async function askAgent(runId) {
      const history = getHistory();
      const run     = history.find(r => r.id === runId);
      if (!run?.jiraTicket) return;

      const jiraConf = JSON.parse(localStorage.getItem('tally_jira_config') || '{}');
      if (!jiraConf.domain) {
        showModal(`<p style="color:var(--accent3);">Jira not configured. Open data-recs.html and configure Jira first.</p>
          <div class="btn-row"><button class="btn btn-secondary btn-sm" onclick="closeModal()">Close</button></div>`);
        return;
      }

      showModal(`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
          <span style="font-size:20px;">🤖</span>
          <div>
            <div style="font-weight:700;font-size:15px;color:var(--text);">Agent — ${esc(run.jiraTicket.key)}</div>
            <div style="font-size:11px;color:var(--text-muted);">Reading Jira comments…</div>
          </div>
          <button onclick="closeModal()" class="btn btn-secondary btn-sm" style="margin-left:auto;">✕</button>
        </div>
        <div id="agent-loading" style="color:var(--text-muted);font-size:13px;padding:20px 0;text-align:center;">
          ⏳ Fetching comments from ${esc(run.jiraTicket.key)}…
        </div>`);

      const auth    = 'Basic ' + btoa(`${jiraConf.email}:${jiraConf.apiToken}`);
      const headers = {
        'Authorization': auth,
        'X-Jira-Domain': jiraConf.domain,
        'X-Jira-Auth':   auth,
        'Content-Type':  'application/json',
        'Accept':        'application/json',
      };

      try {
        // Fetch comments
        const resp = await fetch(
          `http://localhost:9000/jira-proxy/rest/api/3/issue/${run.jiraTicket.key}/comment?orderBy=created`,
          { headers }
        );
        if (!resp.ok) throw new Error(`Jira error: HTTP ${resp.status}`);

        const data     = await resp.json();
        const comments = data.comments || [];

        if (!comments.length) {
          updateModal(`
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
              <span style="font-size:20px;">🎫</span>
              <div style="font-weight:700;font-size:15px;color:var(--text);">${esc(run.jiraTicket.key)}</div>
              <button onclick="closeModal()" class="btn btn-secondary btn-sm" style="margin-left:auto;">✕</button>
            </div>
            <div class="alert alert-info">No comments on this ticket yet.</div>`);
          return;
        }

        // Build plain text
        const commentText = comments.map(c => {
          const author = c.author?.displayName || 'Unknown';
          const text   = extractADFText(c.body);
          const date   = new Date(c.created).toLocaleString();
          return `[${date}] ${author}:\n${text}`;
        }).join('\n\n');

        updateModal(`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
            <span style="font-size:20px;">🤖</span>
            <div>
              <div style="font-weight:700;font-size:15px;color:var(--text);">Agent — ${esc(run.jiraTicket.key)}</div>
              <div style="font-size:11px;color:var(--text-muted);">${comments.length} comment(s) — asking Claude…</div>
            </div>
            <button onclick="closeModal()" class="btn btn-secondary btn-sm" style="margin-left:auto;">✕</button>
          </div>
          <div id="agent-loading" style="color:var(--text-muted);font-size:13px;padding:20px 0;text-align:center;">⏳ Asking Claude…</div>`);

        // Send to Claude
        const agentResp = await fetch('http://localhost:9000/agent', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ comments: commentText, matchKey: 'match_key' }),
        });
        if (!agentResp.ok) {
          const errBody = await agentResp.json().catch(() => ({}));
          const msg = typeof errBody.error === 'string' ? errBody.error : `HTTP ${agentResp.status}`;
          throw new Error(msg);
        }

        const result = await agentResp.json();
        renderAgentModal(run, result, commentText, comments.length);

      } catch (e) {
        updateModal(`
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div style="font-weight:700;color:var(--text);">Agent Error</div>
            <button onclick="closeModal()" class="btn btn-secondary btn-sm">✕</button>
          </div>
          <div class="alert alert-error">❌ ${esc(e.message)}</div>`);
      }
    }

    function renderAgentModal(run, result, commentText, commentCount) {
      const excHtml = result.hasExclusion && result.sqlClause ? `
        <div style="margin-top:14px;padding:14px 16px;background:rgba(0,255,163,.04);border:1px solid rgba(0,255,163,.25);border-radius:8px;">
          <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--green);margin-bottom:8px;">Proposed SQL Exclusion</div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--green);background:var(--bg);padding:8px 10px;border-radius:6px;white-space:pre-wrap;">${esc(result.sqlClause)}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:8px;">To apply this exclusion, open the active reconciliation run in <a href="data-recs.html" style="color:var(--accent);">data-recs.html</a> and use the Ask Agent button on the Jira ticket card.</div>
        </div>` : '';

      updateModal(`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
          <span style="font-size:20px;">🤖</span>
          <div>
            <div style="font-weight:700;font-size:15px;color:var(--text);">Agent — <a href="${esc(run.jiraTicket.url)}" target="_blank" style="color:var(--accent);">${esc(run.jiraTicket.key)} ↗</a></div>
            <div style="font-size:11px;color:var(--text-muted);">${commentCount} comment(s) · Run ${esc(run.date)}</div>
          </div>
          <button onclick="closeModal()" class="btn btn-secondary btn-sm" style="margin-left:auto;">✕</button>
        </div>
        <div style="padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:0;">
          <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);margin-bottom:8px;">Claude Analysis</div>
          <p style="font-size:13px;color:var(--text);line-height:1.75;margin:0;">${esc(result.explanation || 'No specific action detected in the comments.')}</p>
        </div>
        ${excHtml}
        <div style="margin-top:14px;">
          <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">Raw Comments</div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--text-muted);background:var(--bg);padding:10px 12px;border-radius:6px;max-height:140px;overflow-y:auto;white-space:pre-wrap;">${esc(commentText)}</div>
        </div>
        <div class="btn-row" style="margin-top:16px;">
          <button onclick="closeModal()" class="btn btn-secondary btn-sm">Close</button>
        </div>`);
    }

    /* ── ADF TEXT EXTRACTOR ───────────────────────────────────── */
    function extractADFText(adf) {
      // Handle plain string bodies
      if (typeof adf === 'string') return adf.trim();
      if (!adf) return '';
      // Recurse through ADF nodes
      function walk(node) {
        if (!node) return '';
        if (node.type === 'text') return node.text || '';
        if (node.type === 'hardBreak' || node.type === 'rule') return '\n';
        if (Array.isArray(node.content)) return node.content.map(walk).join('');
        if (Array.isArray(node)) return node.map(walk).join('');
        return '';
      }
      const text = walk(adf).replace(/\s+/g, ' ').trim();
      // Last resort: stringify the whole body if extraction yields nothing
      return text || JSON.stringify(adf);
    }

    /* ── MODAL HELPERS ────────────────────────────────────────── */
    function showModal(html) {
      document.getElementById('agent-modal-content').innerHTML = html;
      document.getElementById('agent-modal').style.display = 'flex';
    }
    function updateModal(html) {
      document.getElementById('agent-modal-content').innerHTML = html;
    }
    function closeModal() {
      document.getElementById('agent-modal').style.display = 'none';
    }
    document.getElementById('agent-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('agent-modal')) closeModal();
    });

    render();
  </script>
</body>
</html>
